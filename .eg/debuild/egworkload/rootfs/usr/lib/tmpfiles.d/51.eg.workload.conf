# https://www.freedesktop.org/software/systemd/man/tmpfiles.d.html
# ensure the .ssh folder is created for users.
d /etc/skel/.ssh                 0700 root root - -
C /home/egd                      0700 egd  egd  - /etc/skel
d /etc/eg                        0600 root root - -
D /workload                      0770 egd  egd  - -
D /eg.mnt                        0770 root root - -
D /eg.mod                        0770 egd  egd  - -
D /eg.mod/tmp                    0770 egd  egd  - -
f /var/lib/systemd/linger/eg     0611 root root - -
f /var/lib/systemd/linger/egd    0611 root root - -
R /var/cache/eg-daemon/spool/t/* -    -    -    - -
R /var/cache/eg-daemon/wcache/*  -    -    -    - -
# cleanup any golang container build data
R /tmp/golang/                   -    -    -    - -

# docker's apt configuration disables recommended packages and automatic updates, breaking base assumptions.
# remove these files so apt behaves normally (e.g. unattended-upgrades works as configured).
# by default automatic updates are disabled by apt there is no reason for this nonsense.
# and it prevents a eg runner from automatically updating. which is important for security.
r /etc/apt/apt.conf.d/docker-*   -    -    -    - -

# symlink the env utility functions into profile sessions. this make loadenv/loadenvdir available in bash sessions.
L /etc/profile.d/z99.eg.env.sh   -    -    -    - /usr/share/eg/profile.d/eg.env.sh
